<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
        <style>
            body {
                margin: 20px;
                background-color: white;
                font-family: sans-serif;
            }
            fieldset {
                border: none;
                padding: 0;
                margin: 0;
            }
            header h3 {
                color: brown;
                text-align: center;
                font-size: 2.2em;
                margin: 10px 0;
                font-weight: bold;
            }
            header p {
                font-family: "휴먼편지체", "Comic Sans MS", sans-serif;
                font-size: 1.05em;
                text-indent: 10px;
                margin-bottom: 15px;
            }
            hr {
                border: 0;
                height: 1px;
                background: #ccc;
                margin-bottom: 15px;
            }
            section {
                background-color: lightpink;
                padding: 25px;
                font-family: "휴먼편지체", "Comic Sans MS", sans-serif;
            }
            article {
                margin-bottom: 18px;
                font-size: 1.1em;
                color: brown; /* 타이틀 글자색 갈색 */
                font-weight: bold;
                display: flex;
                align-items: center;
                flex-wrap: wrap;
            }
            article label {
                color: black;
                font-weight: normal;
                margin-left: 10px;
                margin-right: 5px;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
            }

            article label input {
                margin-right: 4px;
            }
            article select {
                margin-left: 10px;
                padding: 2px 5px;
                font-family: sans-serif;
            }
            .textarea-article {
                align-items: flex-start;
            }
            .textarea-article textarea {
                margin-left: 10px;
                width: 350px;
                height: 150px;
                padding: 8px;
                font-family: "휴먼편지체", sans-serif;
                font-size: 1em;
                border: 1px solid #999;
                resize: none;
            }
            footer {
                background-color: orange;
                border-radius: 50px; /* 양 끝이 완전히 둥근 모양 */
                padding: 10px 20px;
                text-align: left;
                margin-top: 15px;
            }

            footer p {
                margin: 0;
                font-family: "Comic Sans MS", sans-serif;
                font-style: italic;
                color: black;
                font-weight: bold;
                font-size: 0.95em;
                text-indent: 10px;
            }
        </style>
    </head>
    <body> 
        <form>
            <fieldset>
                <header>
                <h3>설문지</h3>
                <p> 소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다</p>
                </header>
                <hr>
                <section>
                    <article>
                        학년
                        <label>
                        <input type="radio" name="class" value="1">
                        1학년
                        </label>
                        <label>
                            <input type="radio" name="class" value="2">
                            2학년
                        </label>
                        <label>
                            <input type="radio" name="class" value="3">
                            3학년
                        </label>
                    </article><br>
                    <article>
                        성별:
                        <label>
                            <input type="radio" name="gender" value="1">
                            남
                        </label>
                        <label>
                            <input type="radio" name="gender" value="2">
                            여
                        </label>
                    </article><br>
                    <article>
                        관심 분야:<input type="text" list="interesting">
                        <datalist id="interesting">
                            <option value="게임"></option>
                            <option value="음악"></option>
                            <option value="컴퓨터"></option>
                            <option value="운동"></option>
                        </datalist>
                    </article><br>
                    <article>
                        진로
                        <label>
                            <input type="checkbox" name="course" value="1">
                            개발
                        </label>
                        <label>
                            <input type="checkbox" name="course" value="2">
                            기획
                        </label>
                        <label>
                            <input type="checkbox" name="course" value="3">
                            영업
                        </label>
                        <label>
                            <input type="checkbox" name="course" value="4">
                            창업
                        </label>
                    </article><br>
                    <article>
                        남기고 싶은 말
                        <textarea cols="20" rows="5">글을 남겨주세요.</textarea>
                    </article><br>
                    Copylight 2026 by BUMJUN
                </section>
            </fieldset>
        </form>
    </body>
</html>
