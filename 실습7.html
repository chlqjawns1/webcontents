<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>텍스트 꾸미기</title>
        <style>
            h3{
                text-align: left;
            }
            span{
                text-decoration:underline;
            }
            .p1{
                background-color: aliceblue;
                color: brown;
                text-indent: 1em;
                font-size: 10px;
                font-style:lucida console;
            }
        </style>
    </head>
    <body>
        <h3>텍스트와 폰트</h3>
        <hr>
        <p class="p1">Aliceblude 바탕색에 brown 색의 "lucida console" 폰트로 10px 크기고 <span style="font-size:1.5em">저는 이보다 1.5배 큽니다. </span>
        </p>

    </body>
</html>
