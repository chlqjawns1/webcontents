<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>색 테이블 만들기</title>
        <style>
            #brown{
                background-color:brown; width: 50px; height: 20px;
            }
           #deepskyblue{
                background-color: deepskyblue; width: 50px; height: 20px;
            }
            #blueviolet{
                background-color: blueviolet; width: 50px; height: 20px;
            }
            #gold{
                background-color: gold; width: 50px; height: 20px;
            }
            #darkorange{
                background-color: darkorange; width: 50px; height: 20px;
            }
            #olivedarb{
                background-color: olivedrab; width: 50px; height: 20px;
            }
        </style>
    </head>
    <body>
        <h3>색 이름과 코드</h3>
        <hr>
        <table border="1">
            <thead>
                <tr><td>이름</td><td>코드</td><td>색</td><td>이름</td><td>코드</td><td>색</td></tr>
            </thead>
            <tbody>
                <tr><td>Brown</td><td>#A52A2A</td><td><div id="brown"></div></td><td>DeepSkyBlue</td><td>#00BFFF</td><td><div id="deepskyblue"></div></td></tr>
                <tr><td>Blueviolet</td><td>#BA2BE2</td><td><div id="blueviolet"></div></td><td>Gold</td><td>#FFD700</td><td><div id="gold"></div></td></tr>
                <tr><td>DarkOrange</td><td>#FFBC00</td><td><div id="darkorange"></div></td><td>OliveDrab</td><td>#6BBE23</td><td><div id="olivedarb"></div></td></tr>
            </tbody>
        </table>
    </body>
