<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>도형 서식 폼 만들기</title>
    </head>
    <body>
        <h3>도형 서식 폼 만들기</h3>
        <hr>
        <form>
                <select name="line" size="3">
                    <option value="1">선없음</option>
                    <option value="2"selected>실선</option>
                    <option value="3">접선</option>
                </select><br>
                선두께<input type="number">
                선색<input type="color" value="#00BBFF" onchange="document.body.style.color=this.value"><br>
                투명도(0~100):<input type="range" min="0" max="100" list="transparency">
                <datalist id="transparency">
                <option value="0" label="low"></option>
                <option value="50" label="medium"></option>
                <option value="100" label="high"></option>
                </datalist>
                
        </form>
    </body>
</html>
